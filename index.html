<!DOCTYPE html>
<html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard Remington</title><script src='https://cdn.jsdelivr.net/npm/chart.js'></script><style>body{font-family:Arial,sans-serif;margin:0;background:#0f1115;color:#fff}header{display:flex;align-items:center;gap:20px;padding:16px 24px;background:#181b22;position:sticky;top:0}img{height:42px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;padding:16px}.card{background:#181b22;border-radius:16px;padding:16px;box-shadow:0 4px 14px rgba(0,0,0,.25)}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:6px;border-bottom:1px solid #333;text-align:left}select{padding:8px;border-radius:8px}canvas{max-height:320px}</style></head><body><header><img src='https://www.remingtonlatam.com/py/wp-content/uploads/sites/33/2019/08/logo_remington_est_n.png'><h2>Dashboard Ejecutivo Remington</h2></header><div class='grid'><div class='card'><h3>Venta Total por Año</h3><canvas id='ventas'></canvas></div><div class='card'><h3>Ranking Categorías 2025 vs 2024</h3><canvas id='rank'></canvas></div><div class='card'><h3>Variación 2021 vs 2025</h3><canvas id='var'></canvas></div><div class='card'><h3>Top Categorías Históricas</h3><canvas id='top'></canvas></div><div class='card' style='grid-column:1/-1'><h3>Detalle por Categoría</h3><select id='cat'></select><canvas id='linea'></canvas><div id='tabla'></div></div><div class='card'><h3>Forecast 2026</h3><div id='forecast'></div></div><div class='card'><h3>Quiebres Potenciales</h3><div id='quiebres'></div></div></div><script>
const ventas={years:[2021,2022,2023,2024,2025],tot:[18729,19775,25181,34031,32779]};
const cats=[['BATIDORAS',1866,1091,1100,1359,754],['CAFETERAS',254,1094,1007,2396,1484],['FREIDORAS',34,312,1139,1372,1298],['HORNOS DE MESA',542,202,562,705,1249],['JARRAS ELECTRICAS',189,741,940,932,603]];
const sku={BATIDORAS:[['BD35','Batidora Manual',153,2,[82,44,19,9,0,0,0,0,0,1,0,-1]],['BD44','Batidora Bowl',601,2,[50,43,32,60,103,41,69,76,59,44,22,2]]],CAFETERAS:[['BD72','Cafetera 4 en1',620,10,[40,30,50,60,70,55,65,40,45,50,60,55]]],FREIDORAS:[['BD80','Air Fryer',1298,15,[70,80,95,100,110,105,120,130,115,140,120,113]]]};
new Chart(ventasEl=document.getElementById('ventas'),{type:'bar',data:{labels:ventas.years,datasets:[{label:'Unidades',data:ventas.tot}]}});
const r=cats.map(x=>({n:x[0],v:x[5],p:((x[5]-x[4])/x[4]*100).toFixed(1)})).sort((a,b)=>b.v-a.v);
new Chart(rank,{type:'bar',data:{labels:r.map(x=>x.n),datasets:[{label:'2025',data:r.map(x=>x.v)}]}});
new Chart(var,{type:'bar',data:{labels:cats.map(x=>x[0]),datasets:[{label:'%21-25',data:cats.map(x=>((x[5]-x[1])/x[1]*100).toFixed(1))}]}});
new Chart(top,{type:'line',data:{labels:[2021,2022,2023,2024,2025],datasets:cats.slice(0,4).map((x,i)=>({label:x[0],data:x.slice(1)}))}});
const sel=document.getElementById('cat'); Object.keys(sku).forEach(k=>sel.innerHTML+=`<option>${k}</option>`);
let lineChart; function render(){const d=sku[sel.value]; const months=['E','F','M','A','M','J','J','A','S','O','N','D']; if(lineChart)lineChart.destroy(); lineChart=new Chart(linea,{type:'line',data:{labels:months,datasets:d.map(s=>({label:s[0],data:s[4]}))}}); tabla.innerHTML='<table><tr><th>Cod</th><th>Descripción</th><th>2025</th><th>Stock</th></tr>'+d.sort((a,b)=>b[2]-a[2]).map(s=>`<tr><td>${s[0]}</td><td>${s[1]}</td><td>${s[2]}</td><td>${s[3]}</td></tr>`).join('')+'</table>';}
sel.onchange=render; render();
forecast.innerHTML='<table><tr><th>SKU</th><th>Forecast</th><th>% vs 2025</th></tr><tr><td>BD35</td><td>806</td><td>+427%</td></tr><tr><td>BD72</td><td>1530</td><td>+147%</td></tr></table>';
quiebres.innerHTML='<table><tr><th>SKU</th><th>Stock</th><th>Riesgo</th></tr><tr><td>BD35</td><td>2</td><td>ALTO</td></tr><tr><td>BD72</td><td>10</td><td>MEDIO</td></tr></table>';
</script></body></html>
